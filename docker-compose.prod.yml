# NeoFin AI - Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in production values
#   2. Run migrations: docker-compose -f docker-compose.prod.yml run --rm backend-migrate
#   3. Start services: docker-compose -f docker-compose.prod.yml up -d
#
# Architecture:
#   Internet → nginx:80/443 → backend:8000 → db:5432
#                              ↓
#                        ollama:11434 (optional)
#
# Services:
#   - nginx: Reverse proxy, SSL termination, rate limiting, static files
#   - backend: FastAPI application (internal only, not exposed)
#   - db: PostgreSQL 16 (internal only, not exposed)
#   - backend-migrate: Alembic migrations (run once before starting backend)
#   - ollama: Local LLM for offline AI (optional, profile-based)

services:
  # ==========================================================================
  # Nginx - Reverse Proxy & Static Files
  # - Listens on ports 80/443 (only public-facing service)
  # - Proxies /api/* to backend
  # - Serves frontend static files
  # - Rate limiting, gzip, security headers
  # ==========================================================================
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: /api
    container_name: neofin-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - neofin-external
      - neofin-internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # FastAPI Backend - Application Server (Internal Only)
  # - NOT exposed to external network
  # - Accessible only via nginx proxy
  # - Health check on /system/health
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: neofin-backend
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # AI Configuration
      GIGACHAT_CLIENT_ID: ${GIGACHAT_CLIENT_ID:-}
      GIGACHAT_CLIENT_SECRET: ${GIGACHAT_CLIENT_SECRET:-}
      GIGACHAT_AUTH_URL: ${GIGACHAT_AUTH_URL:-https://ngw.devices.sberbank.ru:9443/api/v2/oauth}
      GIGACHAT_CHAT_URL: ${GIGACHAT_CHAT_URL:-https://gigachat.devices.sberbank.ru/api/v1/chat/completions}
      GIGACHAT_SSL_VERIFY: ${GIGACHAT_SSL_VERIFY:-true}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_API_URL: ${QWEN_API_URL:-https://api.qwen.ai/v1}
      LLM_URL: http://ollama:11434/api/generate
      LLM_MODEL: ${LLM_MODEL:-llama3}
      TASK_STORAGE_DIR: /shared/task-files
      # Application settings
      API_KEY: ${API_KEY}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.5}
      RATE_LIMIT: ${RATE_LIMIT:-100/minute}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TESTING: 0
      TASK_RUNTIME: celery
      TASK_QUEUE_BROKER_URL: ${TASK_QUEUE_BROKER_URL:-redis://redis:6379/0}
      TASK_QUEUE_RESULT_BACKEND: ${TASK_QUEUE_RESULT_BACKEND:-redis://redis:6379/1}
      TASK_EVENTS_REDIS_URL: ${TASK_EVENTS_REDIS_URL:-redis://redis:6379/2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - neofin-internal
    volumes:
      - task-storage:/shared/task-files

  # ==========================================================================
  # PostgreSQL Database (Internal Only)
  # - Persistent storage via volume
  # - Health check via pg_isready
  # ==========================================================================
  db:
    image: postgres:16-alpine
    container_name: neofin-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - neofin-internal

  redis:
    image: redis:8.6-alpine
    container_name: neofin-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - neofin-internal

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: neofin-worker
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      LLM_URL: http://ollama:11434/api/generate
      TASK_STORAGE_DIR: /shared/task-files
      TESTING: 0
      TASK_RUNTIME: celery
      TASK_QUEUE_BROKER_URL: ${TASK_QUEUE_BROKER_URL:-redis://redis:6379/0}
      TASK_QUEUE_RESULT_BACKEND: ${TASK_QUEUE_RESULT_BACKEND:-redis://redis:6379/1}
      TASK_EVENTS_REDIS_URL: ${TASK_EVENTS_REDIS_URL:-redis://redis:6379/2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["./venv/bin/celery", "-A", "src.core.task_queue:celery_app", "worker", "--loglevel=INFO", "-Q", "neofin"]
    healthcheck:
      test: ["CMD-SHELL", "grep -qa celery /proc/1/cmdline"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
    networks:
      - neofin-internal
    volumes:
      - task-storage:/shared/task-files

  # ==========================================================================
  # Database Migrations (run once before starting backend)
  # ==========================================================================
  backend-migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: neofin-migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      TESTING: 0
      DB_WAIT_RETRIES: 30
      DB_WAIT_SECONDS: 2
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["./entrypoint.sh"]
    command: []
    networks:
      - neofin-internal

  # ==========================================================================
  # Ollama - Local LLM (Optional, Offline AI)
  # Enabled only if LLM_URL=http://ollama:11434/api/generate
  # Usage: docker-compose -f docker-compose.prod.yml --profile ollama up -d
  # ==========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: neofin-ollama
    restart: unless-stopped
    profiles:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - neofin-internal

# ==========================================================================
# Networks
# - neofin-external: nginx ↔ internet
# - neofin-internal: nginx ↔ backend ↔ db ↔ ollama
# ==========================================================================
networks:
  neofin-external:
    driver: bridge
  neofin-internal:
    driver: bridge
    internal: true

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  pg_data:
    name: neofin-postgres-data
  ollama_data:
    name: neofin-ollama-data
  nginx_logs:
    name: neofin-nginx-logs
  task-storage:
    name: neofin-task-storage
