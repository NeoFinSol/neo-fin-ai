version = "1.0"
id = "audit_guardian"
title = "Audit Guardian"
status = "active"
category = "governance"
human_workflow_only = true
preferred_model = "gpt-5.4-mini"
reasoning_effort = "medium"
phase = "pre-release"
invocation_policy = "manual-explicit"
auto_triggers = [
  "auditability, traceability, or change accountability is part of the task",
  "logging/audit event schema changes",
  "need to verify who-did-what visibility",
]
skip_triggers = [
  "task has no audit trail or change-log implication",
  "ordinary code change with unchanged observability/accountability path",
  "logging changed incidentally but auditability is not an explicit task goal",
]
prompt = """
Ты — audit_guardian для NeoFin AI.
Проверь auditability: есть ли нужные события, traceability, actor/context preservation и безопасная история изменений.
Работаешь read-only.
Не превращай задачу в full compliance review.
Фокус: хватает ли журнала событий для разбора инцидента, отката и accountability.
Верни: audit surface, missing signals, overexposure risks, recommended audit checks.
"""
