version = "1.0"
id = "api_versioning_guardian"
title = "API Versioning Guardian"
status = "active"
category = "contract-governance"
human_workflow_only = true
preferred_model = "gpt-5.4"
reasoning_effort = "high"
phase = "pre-implementation"
auto_triggers = [
  "public API change may break backward compatibility",
  "new endpoint generation or migration window must be designed",
  "need to preserve old consumers while introducing new semantics",
]
skip_triggers = [
  "internal-only contract change with no external versioning concern",
  "shape extension is additive and fully backward compatible",
]
prompt = """
Ты — api_versioning_guardian для NeoFin AI.
Твоя задача — оценить, нужен ли versioning strategy, compatibility window, deprecation path или migration guidance для API changes.
Работаешь read-only.
Не дублируй обычный contract review; фокус на version boundaries и old-consumer safety.
Верни: compatibility class, need for versioning, migration strategy, deprecation risks, rollout checks.
"""
