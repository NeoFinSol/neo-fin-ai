name: Code Quality

on:
  pull_request:
    branches: [ main, develop ]

env:
  CI_DB_PASSWORD: neofin_ci_password

jobs:
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    
    # Service container без проброса портов - internal network
    services:
      postgres-test:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ env.CI_DB_PASSWORD }}
          POSTGRES_DB: neofin_test
        ports:
          - 5432
        options: >-
          --health-cmd "pg_isready -U postgres -d neofin_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install pytest-cov

    - name: Set environment variables
      # SECURITY: Pass env directly instead of creating .env file
      run: |
        echo "Environment configured securely via GitHub Actions"

    - name: Wait for PostgreSQL service
      env:
        POSTGRES_TEST_PORT: ${{ job.services.postgres-test.ports[5432] }}
      run: |
        python - <<'PY'
        import os
        import time

        import psycopg2

        port = int(os.environ["POSTGRES_TEST_PORT"])
        last_error = None

        for attempt in range(30):
            try:
                with psycopg2.connect(
                    host="127.0.0.1",
                    port=port,
                    user="postgres",
                    password=os.environ["CI_DB_PASSWORD"],
                    dbname="neofin_test",
                ) as connection:
                    with connection.cursor() as cursor:
                        cursor.execute("SELECT 1")
                        cursor.fetchone()
                print(f"coverage postgres ready on port {port}")
                break
            except Exception as error:  # noqa: BLE001
                last_error = error
                time.sleep(1)
        else:
            raise SystemExit(
                f"coverage postgres did not become ready on port {port}: {last_error}"
            )
        PY

    - name: Run tests with coverage
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_DB_PASSWORD }}@127.0.0.1:${{ job.services.postgres-test.ports[5432] }}/neofin_test
        TEST_DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_DB_PASSWORD }}@127.0.0.1:${{ job.services.postgres-test.ports[5432] }}/neofin_test
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        QWEN_API_URL: ${{ secrets.QWEN_API_URL }}
      run: |
        python -m pytest tests/ \
          --cov=src \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          -v \
          --junitxml=test-results.xml

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: |
          htmlcov/
          coverage.xml
          test-results.xml

    - name: Check coverage threshold
      run: |
        # Validate coverage.xml exists
        if [ ! -f coverage.xml ]; then
          echo "❌ CRITICAL: coverage.xml not found. Tests may have failed."
          echo "Check test-results.xml artifact for details."
          exit 1
        fi
        
        # Extract coverage percentage with error handling
        COVERAGE=$(python3 <<'PYTHON_SCRIPT'
        import sys
        import xml.etree.ElementTree as ET

        try:
            tree = ET.parse("coverage.xml")
            root = tree.getroot()

            # Проверка атрибута line-rate
            if "line-rate" not in root.attrib:
                print("ERROR: coverage.xml missing 'line-rate' attribute", file=sys.stderr)
                sys.exit(1)

            coverage = float(root.attrib["line-rate"]) * 100
            print(f"{coverage:.2f}")
        except ET.ParseError as error:
            print(f"ERROR: Failed to parse coverage.xml: {error}", file=sys.stderr)
            sys.exit(1)
        except Exception as error:  # noqa: BLE001
            print(f"ERROR: Unexpected error: {error}", file=sys.stderr)
            sys.exit(1)
        PYTHON_SCRIPT
        )
        
        if [ -z "$COVERAGE" ]; then
          echo "❌ ERROR: Failed to extract coverage value"
          exit 1
        fi
        
        echo "Coverage: $COVERAGE%"
        
        # Fail if coverage is below 70%
        if (( $(echo "$COVERAGE < 70" | bc -l) )); then
          echo "❌ Coverage $COVERAGE% is below threshold (70%)"
          exit 1
        else
          echo "✅ Coverage $COVERAGE% meets threshold (70%)"
        fi

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install mypy
        # Install type stubs for third-party libraries
        pip install types-aiofiles types-PyYAML

    - name: Run mypy type checking
      run: |
        # CRITICAL: Fail on type errors
        # Validate the typed contract-critical slice that currently has a stable mypy baseline
        MYPYPATH=. mypy \
          --namespace-packages \
          --explicit-package-bases \
          --follow-imports=silent \
          --ignore-missing-imports \
          src/models/schemas.py \
          src/models/requests.py \
          src/db/models.py \
          src/utils/circuit_breaker.py \
          --warn-unused-configs \
          --warn-redundant-casts \
          --warn-unreachable \
          --warn-return-any \
          --strict-optional \
          --pretty

    - name: Upload mypy report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: mypy-report
        path: |
          .mypy_cache/
