name: Deploy to Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.neofin.ai
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      env:
        IMAGE_TAG: staging-${{ github.sha }}
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/neofin-backend:$IMAGE_TAG .
        docker push ${{ secrets.DOCKER_USERNAME }}/neofin-backend:$IMAGE_TAG

    - name: Deploy to staging server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USERNAME }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        envs: IMAGE_TAG
        script: |
          cd /opt/neofin
          
          # Pull new image
          docker pull ${{ secrets.DOCKER_USERNAME }}/neofin-backend:$IMAGE_TAG
          
          # Stop old containers
          docker-compose down
          
          # Update docker-compose.yml with new tag
          sed -i "s/image: .*/image: ${{ secrets.DOCKER_USERNAME }}\/neofin-backend:$IMAGE_TAG/" docker-compose.yml
          
          # Run migrations
          docker-compose run --rm backend alembic upgrade head
          
          # Start new containers
          docker-compose up -d
          
          # Health check
          sleep 10
          curl -f http://localhost:8000/system/health || exit 1
          
          # Cleanup old images
          docker image prune -f

    - name: Notify deployment status
      if: always()
      run: |
        echo "Staging deployment completed with status: ${{ job.status }}"
