name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install flake8 black isort

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        # Check for style issues
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting with black
      run: |
        black --check src/ tests/ || true

    - name: Check imports with isort
      run: |
        isort --check-only src/ tests/ || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    # Используем service containers без проброса портов на хост
    services:
      postgres-main:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: neofin
        # ports убраны для безопасности - используем internal network
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s

      postgres-test:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: neofin_test
        # ports убраны для безопасности - используем internal network
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Create .env file
      env:
        # В CI service containers доступны по hostname через internal network
        DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@postgres-main:5432/neofin
        TEST_DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@postgres-test:5432/neofin_test
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        QWEN_API_URL: ${{ secrets.QWEN_API_URL }}
        CORS_ALLOW_ORIGINS: ${{ secrets.CORS_ALLOW_ORIGINS }}
        CORS_ALLOW_METHODS: ${{ secrets.CORS_ALLOW_METHODS }}
        CORS_ALLOW_HEADERS: ${{ secrets.CORS_ALLOW_HEADERS }}
        CORS_ALLOW_CREDENTIALS: ${{ secrets.CORS_ALLOW_CREDENTIALS }}
      run: |
        cat > .env << EOF
DATABASE_URL=$DATABASE_URL
TEST_DATABASE_URL=$TEST_DATABASE_URL
QWEN_API_KEY=$QWEN_API_KEY
QWEN_API_URL=$QWEN_API_URL
CORS_ALLOW_ORIGINS=$CORS_ALLOW_ORIGINS
CORS_ALLOW_METHODS=$CORS_ALLOW_METHODS
CORS_ALLOW_HEADERS=$CORS_ALLOW_HEADERS
CORS_ALLOW_CREDENTIALS=$CORS_ALLOW_CREDENTIALS
EOF

    - name: Run database migrations
      run: |
        alembic upgrade head

    - name: Run unit tests
      run: |
        python -m pytest tests/test_ratios.py tests/test_scoring.py tests/test_pdf_extractor.py -v --tb=short

    - name: Run API tests
      run: |
        python -m pytest tests/test_api.py -v --tb=short

    - name: Run DB integration tests
      run: |
        python -m pytest tests/test_db_integration.py -v --tb=short

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          test-results.xml
          .pytest_cache/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit

    - name: Run bandit security scan
      run: |
        bandit -r src/ -f json -o bandit-report.json || true

    - name: Run pip-audit
      run: |
        pip-audit --format json > pip-audit-report.json || true

    - name: Run safety check
      run: |
        safety check --json > safety-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          pip-audit-report.json
          safety-report.json

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    # Изолированная сеть для безопасности - нет доступа к хосту
    environment:
      COMPOSE_DOCKER_CLI_BUILD: "1"
      DOCKER_BUILDKIT: "1"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image (CI configuration)
      run: |
        # Используем CI конфигурацию БЕЗ проброса портов на хост
        docker-compose -f docker-compose.ci.yml build backend frontend

    - name: Start containers with healthchecks
      run: |
        # Запускаем контейнеры в изолированной сети
        docker-compose -f docker-compose.ci.yml up -d
        
        # Ждём готовности БД через healthchecks вместо sleep
        echo "Waiting for database healthchecks..."
        timeout=60
        interval=3
        elapsed=0
        
        while ! docker-compose -f docker-compose.ci.yml ps | grep -q "(healthy)" && [ $elapsed -lt $timeout ]; do
          sleep $interval
          elapsed=$((elapsed + interval))
          echo "Waiting... ($elapsed/${timeout}s)"
        done
        
        if [ $elapsed -ge $timeout ]; then
          echo "❌ Timeout waiting for containers"
          docker-compose -f docker-compose.ci.yml logs
          exit 1
        fi
        
        echo "✅ All containers healthy"
        docker-compose -f docker-compose.ci.yml ps

    - name: Verify container isolation
      run: |
        # Проверяем, что порты не проброшены на хост
        echo "Verifying no host port mapping..."
        if docker port neofin-backend-1 2>/dev/null; then
          echo "❌ ERROR: Backend ports exposed to host"
          exit 1
        fi
        echo "✅ Container isolation verified"

    - name: Cleanup containers
      if: always()
      run: |
        # Полная очистка контейнеров и сетей
        docker-compose -f docker-compose.ci.yml down --volumes --remove-orphans
        
        # Дополнительная очистка зависших контейнеров
        docker rm -f $(docker ps -aq --filter ancestor=neofin-backend) 2>/dev/null || true
        
        # Очистка unused networks
        docker network prune -f
