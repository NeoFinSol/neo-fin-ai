name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install flake8 black isort

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        # Check for style issues
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting with black
      run: |
        black --check src/ tests/ || true

    - name: Check imports with isort
      run: |
        isort --check-only src/ tests/ || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres-main:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: neofin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-test:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: neofin_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Create .env file
      run: |
        cat > .env << EOF
        DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/neofin
        TEST_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5433/neofin_test
        QWEN_API_KEY=test_key
        QWEN_API_URL=https://api.qwen.ai/v1
        CORS_ALLOW_ORIGINS=http://localhost,http://localhost:80
        CORS_ALLOW_METHODS=GET,POST,PUT,DELETE,OPTIONS
        CORS_ALLOW_HEADERS=Content-Type,Authorization,X-Requested-With
        CORS_ALLOW_CREDENTIALS=false
        EOF

    - name: Run database migrations
      run: |
        alembic upgrade head

    - name: Run unit tests
      run: |
        python -m pytest tests/test_ratios.py tests/test_scoring.py tests/test_pdf_extractor.py -v --tb=short

    - name: Run API tests
      run: |
        python -m pytest tests/test_api.py -v --tb=short

    - name: Run DB integration tests
      run: |
        python -m pytest tests/test_db_integration.py -v --tb=short

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          test-results.xml
          .pytest_cache/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit

    - name: Run bandit security scan
      run: |
        bandit -r src/ -f json -o bandit-report.json || true

    - name: Run pip-audit
      run: |
        pip-audit --format json > pip-audit-report.json || true

    - name: Run safety check
      run: |
        safety check --json > safety-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          pip-audit-report.json
          safety-report.json

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker-compose build backend frontend

    - name: Test Docker containers
      run: |
        docker-compose up -d db db_test
        sleep 10
        docker-compose ps

    - name: Cleanup
      if: always()
      run: |
        docker-compose down
