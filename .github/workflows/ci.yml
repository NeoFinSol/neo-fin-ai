name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install flake8 black isort

    - name: Lint with flake8
      run: |
        # CRITICAL: Stop the build if there are Python syntax errors or undefined names
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        # Check for style issues (warnings only, don't fail)
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting with black
      run: |
        # Fail CI if code is not formatted correctly
        # Only check paths that exist
        BLACK_PATHS="src/ tests/"
        [ -d "scripts" ] && BLACK_PATHS="$BLACK_PATHS scripts/"
        [ -f "*.py" ] && BLACK_PATHS="$BLACK_PATHS *.py"
        black --check $BLACK_PATHS

    - name: Check imports with isort
      run: |
        # Fail CI if imports are not sorted correctly
        # Only check paths that exist
        ISORT_PATHS="src/ tests/"
        [ -d "scripts" ] && ISORT_PATHS="$ISORT_PATHS scripts/"
        isort --check-only $ISORT_PATHS

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    # Используем service containers без проброса портов на хост
    services:
      postgres-main:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: neofin
        # ports убраны для безопасности - используем internal network
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s

      postgres-test:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: neofin_test
        # ports убраны для безопасности - используем internal network
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Set environment variables
      # SECURITY: Don't create .env file with secrets - pass directly to steps
      run: |
        echo "Environment configured via GitHub Actions env context"
        echo "DATABASE_URL and other secrets are passed directly to test steps"

    - name: Run database migrations
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@postgres-main:5432/neofin
        TEST_DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@postgres-test:5432/neofin_test
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        QWEN_API_URL: ${{ secrets.QWEN_API_URL }}
        CORS_ALLOW_ORIGINS: ${{ secrets.CORS_ALLOW_ORIGINS }}
        CORS_ALLOW_METHODS: ${{ secrets.CORS_ALLOW_METHODS }}
        CORS_ALLOW_HEADERS: ${{ secrets.CORS_ALLOW_HEADERS }}
        CORS_ALLOW_CREDENTIALS: ${{ secrets.CORS_ALLOW_CREDENTIALS }}
      run: |
        alembic upgrade head

    - name: Run unit tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@postgres-main:5432/neofin
        TEST_DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@postgres-test:5432/neofin_test
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        QWEN_API_URL: ${{ secrets.QWEN_API_URL }}
        CORS_ALLOW_ORIGINS: ${{ secrets.CORS_ALLOW_ORIGINS }}
        CORS_ALLOW_METHODS: ${{ secrets.CORS_ALLOW_METHODS }}
        CORS_ALLOW_HEADERS: ${{ secrets.CORS_ALLOW_HEADERS }}
        CORS_ALLOW_CREDENTIALS: ${{ secrets.CORS_ALLOW_CREDENTIALS }}
      run: |
        python -m pytest tests/test_ratios.py tests/test_scoring.py tests/test_pdf_extractor.py -v --tb=short

    - name: Run API tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@postgres-main:5432/neofin
        TEST_DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@postgres-test:5432/neofin_test
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        QWEN_API_URL: ${{ secrets.QWEN_API_URL }}
        CORS_ALLOW_ORIGINS: ${{ secrets.CORS_ALLOW_ORIGINS }}
        CORS_ALLOW_METHODS: ${{ secrets.CORS_ALLOW_METHODS }}
        CORS_ALLOW_HEADERS: ${{ secrets.CORS_ALLOW_HEADERS }}
        CORS_ALLOW_CREDENTIALS: ${{ secrets.CORS_ALLOW_CREDENTIALS }}
      run: |
        python -m pytest tests/test_api.py -v --tb=short

    - name: Run DB integration tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@postgres-main:5432/neofin
        TEST_DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@postgres-test:5432/neofin_test
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        QWEN_API_URL: ${{ secrets.QWEN_API_URL }}
        CORS_ALLOW_ORIGINS: ${{ secrets.CORS_ALLOW_ORIGINS }}
        CORS_ALLOW_METHODS: ${{ secrets.CORS_ALLOW_METHODS }}
        CORS_ALLOW_HEADERS: ${{ secrets.CORS_ALLOW_HEADERS }}
        CORS_ALLOW_CREDENTIALS: ${{ secrets.CORS_ALLOW_CREDENTIALS }}
      run: |
        python -m pytest tests/test_db_integration.py -v --tb=short

    - name: Run coverage check
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@postgres-main:5432/neofin
        TEST_DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@postgres-test:5432/neofin_test
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        QWEN_API_URL: ${{ secrets.QWEN_API_URL }}
        CORS_ALLOW_ORIGINS: ${{ secrets.CORS_ALLOW_ORIGINS }}
        CORS_ALLOW_METHODS: ${{ secrets.CORS_ALLOW_METHODS }}
        CORS_ALLOW_HEADERS: ${{ secrets.CORS_ALLOW_HEADERS }}
        CORS_ALLOW_CREDENTIALS: ${{ secrets.CORS_ALLOW_CREDENTIALS }}
      run: |
        python -m pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=80 \
          --ignore=tests/test_auth.py \
          --ignore=tests/test_e2e.py \
          --ignore=tests/test_frontend_e2e.py \
          --ignore=tests/test_benchmarks.py

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          test-results.xml
          .pytest_cache/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit

    - name: Run bandit security scan
      run: |
        # CRITICAL: Fail on security issues (severity: high, confidence: medium)
        bandit -r src/ -f json -o bandit-report.json -ll

    - name: Run pip-audit
      run: |
        # CRITICAL: Fail on known vulnerabilities
        pip-audit --format json > pip-audit-report.json

    - name: Run safety check
      run: |
        # CRITICAL: Fail on known vulnerabilities
        safety check --json > safety-report.json

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          pip-audit-report.json
          safety-report.json

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    # Изолированная сеть для безопасности - нет доступа к хосту
    environment:
      COMPOSE_DOCKER_CLI_BUILD: "1"
      DOCKER_BUILDKIT: "1"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image (CI configuration)
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        QWEN_API_URL: ${{ secrets.QWEN_API_URL }}
        CORS_ALLOW_ORIGINS: ${{ secrets.CORS_ALLOW_ORIGINS }}
        CORS_ALLOW_METHODS: ${{ secrets.CORS_ALLOW_METHODS }}
        CORS_ALLOW_HEADERS: ${{ secrets.CORS_ALLOW_HEADERS }}
        CORS_ALLOW_CREDENTIALS: ${{ secrets.CORS_ALLOW_CREDENTIALS }}
      run: |
        # SECURITY: Secrets passed via environment variables, not hardcoded
        # Используем CI конфигурацию БЕЗ проброса портов на хост
        docker-compose -f docker-compose.ci.yml build backend frontend

    - name: Start containers with healthchecks
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        QWEN_API_URL: ${{ secrets.QWEN_API_URL }}
        CORS_ALLOW_ORIGINS: ${{ secrets.CORS_ALLOW_ORIGINS }}
        CORS_ALLOW_METHODS: ${{ secrets.CORS_ALLOW_METHODS }}
        CORS_ALLOW_HEADERS: ${{ secrets.CORS_ALLOW_HEADERS }}
        CORS_ALLOW_CREDENTIALS: ${{ secrets.CORS_ALLOW_CREDENTIALS }}
      run: |
        # SECURITY: Secrets injected via env vars, not in compose file
        # Запускаем контейнеры и ждём готовности через depends_on healthchecks
        docker-compose -f docker-compose.ci.yml up -d
        
        # SECURITY: Don't echo secrets or environment variables in logs
        echo "Waiting for all services to become healthy..."
        
        # Максимум 20 попыток с интервалом 3 секунды (60 секунд всего)
        max_attempts=20
        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          # Проверяем статус всех сервисов
          if docker-compose -f docker-compose.ci.yml ps | grep -q "healthy"; then
            # Проверяем, что ВСЕ сервисы healthy
            unhealthy_count=$(docker-compose -f docker-compose.ci.yml ps | grep -c "(unhealthy)" || echo "0")
            starting_count=$(docker-compose -f docker-compose.ci.yml ps | grep -c "(starting)" || echo "0")
            
            if [ "$unhealthy_count" = "0" ] && [ "$starting_count" = "0" ]; then
              echo "✅ All containers are healthy"
              docker-compose -f docker-compose.ci.yml ps
              exit 0
            fi
          fi
          
          echo "Waiting... (attempt $attempt/$max_attempts)"
          sleep 3
          attempt=$((attempt + 1))
        done
        
        # Timeout - выводим логи для отладки
        echo "❌ Timeout waiting for containers to become healthy"
        echo "Container status:"
        docker-compose -f docker-compose.ci.yml ps
        echo "Container logs:"
        docker-compose -f docker-compose.ci.yml logs
        exit 1

    - name: Verify container isolation
      run: |
        # Проверяем, что порты не проброшены на хост
        echo "Verifying no host port mapping..."
        if docker port neofin-backend-1 2>/dev/null; then
          echo "❌ ERROR: Backend ports exposed to host"
          exit 1
        fi
        echo "✅ Container isolation verified"

    - name: Cleanup containers
      if: always()
      run: |
        # Полная очистка контейнеров и сетей
        docker-compose -f docker-compose.ci.yml down --volumes --remove-orphans
        
        # Дополнительная очистка зависших контейнеров (safe с xargs -r)
        docker ps -aq --filter ancestor=neofin-backend | xargs -r docker rm -f
        
        # Очистка unused networks
        docker network prune -f
