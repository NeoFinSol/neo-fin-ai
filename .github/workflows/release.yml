name: Release and Version Tagging

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

jobs:
  create-release:
    name: Create Release and Tag
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for tags

    - name: Configure Git
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"

    - name: Validate version format
      run: |
        VERSION="${{ github.event.inputs.version }}"
        if ! [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "❌ Invalid version format. Use semantic versioning (e.g., 1.0.0)"
          exit 1
        fi
        echo "✅ Version format valid: $VERSION"

    - name: Check if tag already exists
      id: check_tag
      run: |
        if git rev-parse "v${{ github.event.inputs.version }}" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "❌ Tag v${{ github.event.inputs.version }} already exists"
          exit 1
        fi
        echo "exists=false" >> $GITHUB_OUTPUT

    - name: Generate changelog
      id: changelog
      run: |
        # Get last tag
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        
        if [ -z "$LAST_TAG" ]; then
          # First release - get all commits
          CHANGELOG=$(git log --pretty=format:"* %s (%h)" --no-merges)
        else
          # Get commits since last tag
          CHANGELOG=$(git log --pretty=format:"* %s (%h)" --no-merges $LAST_TAG..HEAD)
        fi
        
        # Save changelog to file
        echo "$CHANGELOG" > CHANGELOG.md
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create and push tag
      run: |
        git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
        git push origin "v${{ github.event.inputs.version }}"

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.event.inputs.version }}
        release_name: Release v${{ github.event.inputs.version }}
        body: |
          ## Changes in this release
          
          ${{ steps.changelog.outputs.changelog }}
          
          ---
          *This release was created automatically by GitHub Actions*
        draft: false
        prerelease: ${{ github.event.inputs.release_type == 'patch' && false || false }}

    - name: Update VERSION file
      run: |
        echo "${{ github.event.inputs.version }}" > VERSION
        git add VERSION
        git commit -m "chore: update VERSION to ${{ github.event.inputs.version }}"
        git push origin main

    - name: Notify release status
      if: always()
      run: |
        echo "Release v${{ github.event.inputs.version }} created successfully"
