# Docker Compose для CI/CD
# БЕЗ проброса хост-портов - используется только внутренняя сеть
# Запускается в GitHub Actions для тестирования сборки

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # Нет ports: - не пробрасываем порты на хост в CI
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/neofin
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db_test:5432/neofin_test
      DB_WAIT_RETRIES: 30
      DB_WAIT_SECONDS: 2
      QWEN_API_KEY: test_key
      QWEN_API_URL: https://api.qwen.ai/v1
      CORS_ALLOW_ORIGINS: http://localhost
      CORS_ALLOW_METHODS: GET,POST,PUT,DELETE,OPTIONS
      CORS_ALLOW_HEADERS: Content-Type,Authorization,X-Requested-With
      CORS_ALLOW_CREDENTIALS: false
    depends_on:
      db:
        condition: service_healthy
      db_test:
        condition: service_healthy
    networks:
      - ci-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://backend:8000
    # Нет ports: - не пробрасываем порты на хост в CI
    networks:
      - ci-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neofin
    # Нет ports: - не пробрасываем порты на хост в CI
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neofin"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    networks:
      - ci-net

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neofin_test
    # Нет ports: - не пробрасываем порты на хост в CI
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neofin_test"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    networks:
      - ci-net

networks:
  ci-net:
    driver: bridge
    # Эфемерная сеть - удаляется после завершения workflow

volumes:
  postgres-test-data:
    # Временное хранилище - удаляется после workflow
