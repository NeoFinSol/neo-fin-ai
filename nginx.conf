# NeoFin AI - Production Nginx Configuration
# Reverse proxy, rate limiting, gzip, security headers

# Rate limiting zone: 10 requests per second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Upstream backend (load balancing ready)
upstream backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Document root for frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression (reduces bandwidth by 60-80%)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Security headers (protect against common attacks)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' http://localhost:* ws://localhost:*;" always;

    # ==========================================================================
    # Health Check Endpoint (proxied to backend)
    # Used by docker-compose healthcheck and load balancers
    # ==========================================================================
    location = /system/health {
        proxy_pass http://backend/system/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ==========================================================================
    # API Proxy (reverse proxy to backend)
    # All /api/* requests forwarded to FastAPI backend
    # Rate limiting applied (10 req/s with burst)
    # ==========================================================================
    location /api/ {
        # Rate limiting: 10 req/s, burst 20, nodelay (reject excess immediately)
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend/;

        # Required headers for backend to see real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future SSE/realtime features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts (match backend AI_TIMEOUT=120s)
        proxy_connect_timeout 75s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Buffer settings (disable for streaming responses)
        proxy_buffering off;
        proxy_cache off;

        # Error handling
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /api-unavailable.html;
    }

    # ==========================================================================
    # SPA Routing (React Router)
    # If file/directory doesn't exist, serve index.html
    # ==========================================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================================================
    # Static Assets Caching (immutable assets from Vite build)
    # Vite adds content hash to filenames → safe to cache for 1 year
    # ==========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==========================================================================
    # HTML Files (never cache - need fresh version for SPA updates)
    # ==========================================================================
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ==========================================================================
    # Custom error page for API unavailable (503)
    # ==========================================================================
    location = /api-unavailable.html {
        internal;
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><title>Service Unavailable</title></head><body><h1>503 Service Unavailable</h1><p>The API is temporarily unavailable. Please try again later.</p></body></html>';
    }
}

