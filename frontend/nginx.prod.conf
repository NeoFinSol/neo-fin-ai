# NeoFin AI Frontend - Production Nginx Configuration
# Serves React SPA + proxies /api/ to backend

# Rate limiting zone: 10 requests per second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # Document root
    root /usr/share/nginx/html;
    index index.html;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression (reduces bandwidth, improves load time)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Security headers (protect against common attacks)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss: http: https:;" always;

    # ==========================================================================
    # SPA Routing (React Router)
    # If file/directory doesn't exist, serve index.html (client-side routing)
    # ==========================================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================================================
    # API Proxy (reverse proxy to backend)
    # All /api/ requests forwarded to http://backend:8000/
    # ==========================================================================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/;

        # Required headers for backend to see real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 75s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Buffer settings
        proxy_buffering off;
        proxy_cache off;

        proxy_intercept_errors on;
        error_page 502 503 504 =503 /api-unavailable.html;
    }

    # ==========================================================================
    # Static Assets Caching (immutable assets from Vite build)
    # Vite adds content hash to filenames → safe to cache for 1 year
    # ==========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==========================================================================
    # HTML Files (never cache - need fresh version for SPA updates)
    # ==========================================================================
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /api-unavailable.html {
        internal;
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><title>Service Unavailable</title></head><body><h1>503 Service Unavailable</h1><p>The API is temporarily unavailable. Please try again later.</p></body></html>';
    }
}

